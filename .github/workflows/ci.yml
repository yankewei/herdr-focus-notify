name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt -- --check
      - run: cargo test
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo build --release
